services:
  postgres:
    image: postgres:17-alpine
    container_name: control_plane_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: control_plane
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d control_plane"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
